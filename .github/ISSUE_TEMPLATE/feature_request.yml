name: Feature request
description: Suggest a focused improvement to discovery, safety, or cleanup control.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today, and who experiences it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior change.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety implications
      description: Could this expand discovery, cleanup eligibility, or what VibeVac is allowed to remove?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
